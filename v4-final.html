<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>私人视觉训练台 V4.2</title><style>:root{--bg:#f5f5f7;--p:#fff;--t:#1d1d1f;--m:#6e6e73;--l:#e5e5ea;--a:#0071e3;--s:0 14px 40px rgba(0,0,0,.07)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.w{max-width:1280px;margin:auto;padding:24px 16px 48px}.box{background:var(--p);border:1px solid var(--l);border-radius:30px;box-shadow:var(--s)}.top{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-bottom:14px}.hero,.ctrl,.main,.case,.rule{padding:22px}.k{font-size:12px;color:var(--m);letter-spacing:.1em;margin-bottom:10px}.hero h1{margin:0 0 10px;font-size:34px;line-height:1.08;letter-spacing:-.03em}.hero p,.desc{margin:0;color:var(--m);font-size:14px;line-height:1.85}.tags,.row,.pills{display:flex;gap:8px;flex-wrap:wrap}.tags{margin-top:14px}.tag,.pill,.btn{padding:8px 11px;border-radius:999px;background:#f3f4f6;border:1px solid var(--l);font-size:12px;color:#4d4d52}.btn{font-size:13px;background:#fff;cursor:pointer}.btn.on{background:#1d1d1f;color:#fff;border-color:#1d1d1f}.ctrl{display:grid;gap:14px}.lab{font-size:12px;color:var(--m);margin-bottom:8px}.rail{display:flex;gap:8px;overflow:auto;scrollbar-width:none}.rail::-webkit-scrollbar{display:none}.focus{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}.f{padding:18px}.f b{display:block;color:var(--m);font-size:13px;margin-bottom:8px}.f p{margin:0;font-size:16px;line-height:1.65;font-weight:650}.head,.caseHead{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:14px}.time{font-size:12px;color:var(--m);margin-bottom:8px}h2{margin:0;font-size:28px;line-height:1.1;letter-spacing:-.02em}.stage{display:grid;grid-template-columns:1.22fr .9fr .9fr;gap:12px;margin-bottom:14px}.si{position:relative;min-height:250px;border-radius:24px;overflow:hidden;background:#eee;border:1px solid var(--l);cursor:pointer}.si.big{grid-row:span 2;min-height:410px}.si img,.card img{width:100%;height:100%;object-fit:cover;display:block}.ov{position:absolute;left:0;right:0;bottom:0;padding:15px;color:#fff;background:linear-gradient(180deg,transparent,rgba(0,0,0,.55))}.ov small{font-size:12px;opacity:.85}.ov b{display:block;margin-top:5px;font-size:17px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:#fbfbfd;border:1px solid var(--l);border-radius:24px;overflow:hidden}.card img{aspect-ratio:4/3;height:auto}.cb{padding:14px}.kind{font-size:12px;color:var(--a);font-weight:700;margin-bottom:8px}.card h3{margin:0 0 10px;font-size:19px}.line{margin:0 0 6px;color:var(--m);font-size:13px;line-height:1.75}.line b{color:var(--t)}.mini{margin-top:12px;padding:12px;border-radius:18px;background:#f3f4f7;border:1px solid var(--l);font-size:12px;line-height:1.7;color:#555}.case{margin-top:14px}.caseGrid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.art{height:540px;border-radius:26px;overflow:hidden;background:#e9e7e2;border:1px solid var(--l)}.art svg{width:100%;height:100%;display:block}.info{display:grid;gap:10px}.ibox{padding:14px;border:1px solid var(--l);border-radius:18px;background:#fafbfc}.ibox h4{margin:0 0 7px;font-size:14px}.ibox p{margin:0;color:var(--m);font-size:13px;line-height:1.8}.steps{margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.step{padding:13px;border:1px solid var(--l);border-radius:18px;background:#fafbfc}.step b{display:block;font-size:13px;margin-bottom:6px}.step p{margin:0;color:var(--m);font-size:12px;line-height:1.7}.rule{margin-top:14px;display:grid;grid-template-columns:120px 1fr;gap:16px}.rule b{color:var(--m);font-size:12px;letter-spacing:.1em}.rule p{margin:0;color:#3a3a3f;font-size:15px;line-height:1.8}.stamp{font-size:11px;color:#999;margin-top:8px}@media(max-width:1080px){.top,.caseGrid{grid-template-columns:1fr}.focus,.steps{grid-template-columns:1fr}.stage{grid-template-columns:1fr 1fr}.si.big{grid-column:span 2;grid-row:auto}.cards{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.w{padding:16px 12px}.hero h1{font-size:27px}.head,.caseHead{display:block}.stage,.cards{grid-template-columns:1fr}.si.big{grid-column:auto}.art{height:380px}.rule{grid-template-columns:1fr}}</style></head><body><div class="w"><section class="top"><div class="box hero"><div class="k">PRIVATE VISUAL TRAINING DESK · V4.2 FINAL</div><h1>私人视觉训练台</h1><p>上方只做审美输入：摄影、镜头、穿搭。下方固定展示 Dr.Coffee 今日相关案例，用来转译成你可以真实拍摄的产品图。</p><div class="tags" id="tags"></div><div class="stamp">当前版本：V4.2-final-0701 · 独立页面，绕过旧首页缓存。</div></div><div class="box ctrl"><div><div class="lab">历史日期</div><div class="rail" id="dates"></div></div><div><div class="lab">时间段</div><div class="row"><button class="btn on" id="am">晨间</button><button class="btn" id="pm">晚间</button></div></div><div class="desc">现在只保留昨天和今天。后续每天逐步增加，不再一次性堆历史。</div></div></section><section class="focus"><div class="box f"><b>今日只看</b><p id="focus"></p></div><div class="box f"><b>工作转译</b><p id="transfer"></p></div><div class="box f"><b>今天只记一个方法</b><p id="one"></p></div></section><section class="box main"><div class="head"><div><div class="time" id="time"></div><h2 id="theme"></h2><p class="desc" id="intro"></p></div><div class="pills"><span class="pill" id="datePill"></span><span class="pill">摄影 / 镜头 / 穿搭</span><span class="pill">无产品库重复</span></div></div><div class="stage" id="stage"></div><div class="cards" id="cards"></div></section><section class="box case"><div class="caseHead"><div><div class="k">DR.COFFEE · 今日相关案例</div><h2 id="caseTitle"></h2><p class="desc" id="caseDesc"></p></div><div class="pills"><span class="pill">场景融入</span><span class="pill">操作步骤</span><span class="pill">每日固定展示</span></div></div><div class="caseGrid"><div class="art" id="caseArt"></div><div class="info"><div class="ibox"><h4>场景</h4><p id="caseScene"></p></div><div class="ibox"><h4>灯光</h4><p id="caseLight"></p></div><div class="ibox"><h4>构图 / 焦段</h4><p id="caseLens"></p></div><div class="ibox"><h4>调色</h4><p id="caseColor"></p></div></div></div><div class="steps" id="caseSteps"></div></section><section class="box rule"><b>今日原则</b><p id="principle"></p></section></div><script>const PHOTO='https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1200&q=75',LENS='https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=75',OUTFIT='https://images.unsplash.com/photo-1516826957135-700dedea698c?auto=format&fit=crop&w=1200&q=75',HOTEL='https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1200&q=75',ARCH='https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1200&q=75';function f15Art(){return `<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="wall" x1="0" x2="1"><stop offset="0" stop-color="#fbfbfa"/><stop offset="1" stop-color="#e6e9e8"/></linearGradient><linearGradient id="wood" y1="0" y2="1"><stop offset="0" stop-color="#d8bd95"/><stop offset="1" stop-color="#c5a274"/></linearGradient><filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="18" stdDeviation="15" flood-opacity=".16"/></filter></defs><rect width="1000" height="700" fill="url(#wall)"/><rect x="0" y="0" width="145" height="450" fill="#f8ffff"/><line x1="145" y1="0" x2="145" y2="450" stroke="#d2d5d4" stroke-width="4"/><circle cx="72" cy="365" r="28" fill="#9fbc7e" opacity=".45"/><circle cx="105" cy="330" r="18" fill="#7fa15f" opacity=".55"/><path d="M0 360 C130 310,260 320,390 350 S670 410,1000 350 V700 H0Z" fill="#dfe4e3" opacity=".25"/><rect x="0" y="430" width="1000" height="270" fill="url(#wood)"/><g opacity=".22" stroke="#8a6f4f" stroke-width="2"><line x1="0" y1="592" x2="1000" y2="592"/><line x1="210" y1="430" x2="210" y2="700"/><line x1="520" y1="430" x2="520" y2="700"/><line x1="810" y1="430" x2="810" y2="700"/></g><g filter="url(#sh)" transform="translate(250 180)"><rect x="0" y="120" width="245" height="250" rx="12" fill="#f4f4f2"/><rect x="0" y="120" width="90" height="250" rx="12" fill="#3d3f42"/><rect x="75" y="112" width="135" height="38" rx="10" fill="#3b211b"/><circle cx="95" cy="130" r="5" fill="#7a4a37"/><circle cx="116" cy="130" r="5" fill="#7a4a37"/><circle cx="137" cy="130" r="5" fill="#7a4a37"/><rect x="120" y="145" width="200" height="85" rx="12" fill="#17191c"/><rect x="137" y="160" width="165" height="55" rx="4" fill="#7253a8"/><g fill="#d8b05a"><rect x="148" y="168" width="20" height="15" rx="3"/><rect x="177" y="168" width="20" height="15" rx="3"/><rect x="206" y="168" width="20" height="15" rx="3"/><rect x="235" y="168" width="20" height="15" rx="3"/><rect x="264" y="168" width="20" height="15" rx="3"/><rect x="148" y="190" width="20" height="15" rx="3"/><rect x="177" y="190" width="20" height="15" rx="3"/><rect x="206" y="190" width="20" height="15" rx="3"/><rect x="235" y="190" width="20" height="15" rx="3"/><rect x="264" y="190" width="20" height="15" rx="3"/></g><rect x="128" y="230" width="72" height="160" rx="8" fill="#f7f7f6"/><rect x="142" y="382" width="42" height="20" rx="5" fill="#111"/><rect x="70" y="382" width="230" height="38" rx="5" fill="#e7e7e5"/><rect x="85" y="420" width="200" height="45" rx="4" fill="#1d1d1f"/></g><g filter="url(#sh)"><ellipse cx="650" cy="515" rx="42" ry="9" fill="#927250" opacity=".24"/><path d="M620 460 h70 v42 c0 35-70 35-70 0z" fill="#fff"/><path d="M687 475 c45 0 45 44 0 44" fill="none" stroke="#fff" stroke-width="15"/><path d="M705 493 c20 0 20 18 0 18" fill="none" stroke="#d0d0d0" stroke-width="4"/></g><rect x="750" y="500" width="170" height="22" rx="4" fill="#f6f6f3" transform="skewX(-18)"/><rect x="760" y="492" width="170" height="18" rx="4" fill="#fff" transform="skewX(-18)"/><text x="575" y="128" font-size="34" fill="#1d1d1f" font-weight="700">F15 办公室空气感案例</text><text x="575" y="172" font-size="18" fill="#606065">左后45°柔光 / 右侧留白 / 低饱和暖白</text></svg>`}function castleArt(){return `<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#2c2a27"/><stop offset="1" stop-color="#5b5045"/></linearGradient><linearGradient id="wood" y1="0" y2="1"><stop offset="0" stop-color="#6c4b32"/><stop offset="1" stop-color="#3d281d"/></linearGradient><filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="20" stdDeviation="16" flood-opacity=".3"/></filter></defs><rect width="1000" height="700" fill="url(#bg)"/><circle cx="750" cy="210" r="260" fill="#d9ba88" opacity=".16"/><rect x="0" y="430" width="1000" height="270" fill="url(#wood)"/><g filter="url(#sh)" transform="translate(290 230)"><rect x="0" y="0" width="310" height="210" rx="12" fill="#d9d0c2"/><rect x="18" y="25" width="274" height="120" rx="8" fill="#1d1d1f"/><rect x="45" y="55" width="220" height="70" rx="5" fill="#393939"/><rect x="80" y="150" width="150" height="50" rx="8" fill="#efede8"/></g><text x="620" y="185" font-size="34" fill="#fff" font-weight="700">Castle 300 酒店商务感</text><text x="620" y="230" font-size="18" fill="#e7ded0">深木色台面 / 暖灰背景 / 侧后方高光</text></svg>`}const DB={'2026-06-30':{label:'07:30 · 晨间',theme:'安藤忠雄式的光',intro:'光的形状是否已经完成构图。',tags:['混凝土','自然光','几何阴影','静止镜头'],focus:'光的形状是否已经完成构图。',transfer:'适合无影棚、展厅、Hero Shot。',one:'拍之前先观察光落在哪里。',principle:'光本身就是构图。',items:[['摄影',ARCH,'几何光影','看光斑和阴影怎样决定节奏。','拍之前先观察光怎么走。'],['镜头',LENS,'静止更能看空间','看为什么镜头不需要乱动。','空间片可以更稳。'],['穿搭',OUTFIT,'深浅比比花样重要','看上浅下深或上深下浅。','先看明度关系。']],case:{title:'Castle 300｜酒店商务感案例',desc:'用深木色吧台和暖灰空间，强调设备体量、厚度和商用价值。',scene:'酒店吧台 / 商务接待区。深木色台面、暖灰墙、少量杯具。',light:'右后方或左后方45°暖白柔光，正面弱补，保留侧面暗部。',lens:'50mm中焦，略低机位，突出机器体量。',color:'暖灰 + 深木色，金属保持干净，不要发黄发脏。',steps:['搭深木色台面','放机器偏左','打侧后方柔光','只留杯子点缀'],art:castleArt}},'2026-07-01':{label:'07:30 · 晨间',theme:'空气感',intro:'空气、光线、色温是否统一。',tags:['环境先行','相同色温','静态叙事','轻商务'],focus:'空气、光线、色温是否统一。',transfer:'用于办公室咖啡机、LinkedIn封面和产品氛围片。',one:'先找光，再放主体，最后才加道具。',principle:'先感受空气和光，再去看主体。',items:[['摄影',PHOTO,'先看空间空气','看光有没有在空间里流动。','先挑自然光好的时间拍。'],['镜头',LENS,'静态镜头积累情绪','看镜头为什么慢。','镜头停住，情绪才会出来。'],['穿搭',OUTFIT,'挺括与柔软一起出现','看外套和内搭的关系。','适合你的轻商务通勤。']],case:{title:'F15 白色版｜办公室空气感案例',desc:'把 F15 放进办公室茶水间或窗边咖啡角，目标是安静、轻商务、有空气感。',scene:'办公室茶水间 / 窗边咖啡角。浅灰墙面、木色台面、白杯、杂志、小植物。',light:'左后方45°柔光，正面白板轻补。不要把机器正面打平。',lens:'35mm或50mm，中景优先。机器放左1/3，右侧留白。',color:'低饱和，白墙不发黄，木色不过橙，机器白色保持干净。',steps:['先定场景','再找主光','放机器','加杯子与杂志'],art:f15Art}}};let date='2026-07-01',slot='morning';function renderDates(){dates.innerHTML='';Object.keys(DB).forEach(d=>{let b=document.createElement('button');b.className='btn'+(d===date?' on':'');b.textContent=d;b.onclick=()=>{date=d;render()};dates.appendChild(b)})}function render(){renderDates();let d=DB[date];time.textContent=slot==='morning'?d.label:'18:30 · 晚间';theme.textContent=d.theme;intro.textContent=d.intro;datePill.textContent=date;focus.textContent=d.focus;transfer.textContent=d.transfer;one.textContent=d.one;principle.textContent=d.principle;tags.innerHTML=d.tags.map(x=>`<span class=tag>${x}</span>`).join('');stage.innerHTML='';d.items.forEach((it,i)=>{let e=document.createElement('div');e.className='si'+(i===0?' big':'');e.innerHTML=`<img src='${it[1]}'><div class=ov><small>${it[0]}</small><b>${it[2]}</b></div>`;stage.appendChild(e)});cards.innerHTML='';d.items.forEach(it=>{let c=document.createElement('article');c.className='card';c.innerHTML=`<img src='${it[1]}'><div class=cb><div class=kind>${it[0]}</div><h3>${it[2]}</h3><p class=line><b>看：</b>${it[3]}</p><p class=line><b>借：</b>${it[4]}</p><div class=mini>先模仿光线和比例，不急着模仿道具。</div></div>`;cards.appendChild(c)});let cs=d.case;caseTitle.textContent=cs.title;caseDesc.textContent=cs.desc;caseScene.textContent=cs.scene;caseLight.textContent=cs.light;caseLens.textContent=cs.lens;caseColor.textContent=cs.color;caseSteps.innerHTML=cs.steps.map((s,i)=>`<div class=step><b>STEP 0${i+1}</b><p>${s}</p></div>`).join('');caseArt.innerHTML=cs.art()}am.onclick=()=>{slot='morning';am.classList.add('on');pm.classList.remove('on');render()};pm.onclick=()=>{slot='evening';pm.classList.add('on');am.classList.remove('on');render()};render();</script></body></html>
