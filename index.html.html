<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Daily Aesthetic · 2026.07.01</title>
<style>
:root {
  --bg:#f5f5f7;
  --panel:#ffffff;
  --text:#1d1d1f;
  --muted:#6e6e73;
  --line:#e5e5e7;
  --accent:#0071e3;
  --soft:#fbfbfd;
  --radius:28px;
  --shadow:0 10px 28px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
.wrap{max-width:1280px;margin:0 auto;padding:24px 16px 56px;}
.topbar{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;margin-bottom:18px}
.meta{background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px 22px}
.date{font-size:13px;color:var(--muted);margin-bottom:8px}
.summary{font-size:20px;line-height:1.35;font-weight:600;letter-spacing:-.02em;margin:0 0 6px}
.subsummary{font-size:14px;color:var(--muted);line-height:1.7}
.segment{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--panel);padding:10px;border-radius:22px;border:1px solid var(--line);box-shadow:var(--shadow)}
button{padding:12px 18px;border-radius:16px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:15px;cursor:pointer;transition:.2s}
button.active{background:#1d1d1f;color:#fff}
.section{background:var(--panel);border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);padding:20px}
.head{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:14px}
.label{font-size:13px;color:var(--muted);margin-bottom:6px}
h1{margin:0;font-size:28px;line-height:1.1;font-weight:600;letter-spacing:-.02em}
.keywords{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:8px 10px;border-radius:999px;background:#f2f2f4;color:#4d4d52;font-size:12px}
.gallery{display:grid;grid-template-columns:1.25fr .95fr .95fr;grid-template-rows:180px 180px;gap:12px;margin-bottom:14px}
.item{position:relative;overflow:hidden;border-radius:24px;background:#f0f0f2}
.item img{width:100%;height:100%;object-fit:cover;display:block}
.heroimg{grid-row:span 2}
.overlay{position:absolute;left:0;right:0;bottom:0;padding:14px;color:#fff;font-size:13px;background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.45))}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{background:var(--soft);border:1px solid var(--line);border-radius:24px;overflow:hidden;min-height:334px;display:flex;flex-direction:column}
.card img{width:100%;aspect-ratio:4/3;object-fit:cover;background:#eee;display:block}
.card-body{padding:14px 14px 16px}
.group{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:8px}
.card h3{margin:0 0 10px;font-size:18px;line-height:1.35;font-weight:600;letter-spacing:-.01em}
.meta-line{color:var(--muted);font-size:13px;line-height:1.75;margin:0 0 6px}
.meta-line strong{color:var(--text);font-weight:600}
.principle{margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px 20px;display:grid;grid-template-columns:130px 1fr;gap:16px}
.principle b{font-size:13px;color:var(--muted);letter-spacing:.08em}
.principle p{margin:0;font-size:15px;line-height:1.8;color:#3a3a3c}
.foot{text-align:center;color:var(--muted);font-size:12px;line-height:1.7;margin-top:14px}
@media (max-width:1100px){
  .topbar{grid-template-columns:1fr}
  .gallery{grid-template-columns:1fr 1fr;grid-template-rows:180px 180px 180px}
  .heroimg{grid-column:span 2;grid-row:span 1}
  .cards{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:640px){
  .wrap{padding:18px 12px 34px}
  .head{display:block}
  h1{font-size:24px}
  .keywords{margin-top:12px}
  .gallery{grid-template-columns:1fr;grid-template-rows:none}
  .heroimg{grid-column:span 1}
  .cards{grid-template-columns:1fr}
  .principle{grid-template-columns:1fr}
}
</style>
</head>

  $("#principle").textContent = data.principle;

  const overlayText = ["主题主图","摄影延展","空间参考","穿搭层次","细节关系","情绪补充"];
  $("#gallery").innerHTML = data.gallery.map((img, i) => `
    <div class="item ${i===0 ? "heroimg" : ""}">
      <img src="${img}" alt="gallery-${i+1}">
      <div class="overlay">${overlayText[i]}</div>
    </div>
  `).join("");

  $("#cards").innerHTML = data.cards.map(card => `
    <article class="card">
      <img src="${card.img}" alt="${card.title}">
      <div class="card-body">
        <div class="group">${card.group}</div>
        <h3>${card.title}</h3>
        <p class="meta-line"><strong>看：</strong>${card.watch}</p>
        <p class="meta-line"><strong>借：</strong>${card.apply}</p>
      </div>
    </article>
  `).join("");
}

$("#morning").onclick = ()=>{
  slot = "morning";
  $("#morning").classList.add("active");
  $("#evening").classList.remove("active");
  render();
}
$("#evening").onclick = ()=>{
  slot = "evening";
  $("#evening").classList.add("active");
  $("#morning").classList.remove("active");
  render();
}
render();
</script>
</body>
</html>
