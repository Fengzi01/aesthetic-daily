<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>私人视觉训练台</title><style>:root{--bg:#f5f5f7;--p:#fff;--t:#1d1d1f;--m:#6e6e73;--l:#e6e6eb;--a:#0071e3;--s:0 12px 32px rgba(0,0,0,.06)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.w{max-width:1320px;margin:auto;padding:24px 16px 48px}.box{background:var(--p);border:1px solid var(--l);border-radius:28px;box-shadow:var(--s)}.top{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-bottom:14px}.hero,.ctrl,.main,.case,.method{padding:22px}.k{font-size:12px;color:var(--m);letter-spacing:.08em;margin-bottom:10px}.hero h1{margin:0 0 10px;font-size:34px;line-height:1.08;letter-spacing:-.03em}.hero p,.desc{margin:0;color:var(--m);font-size:14px;line-height:1.85}.keys,.row,.pills{display:flex;gap:8px;flex-wrap:wrap}.keys{margin-top:14px}.tag,.pill,.btn{padding:8px 11px;border-radius:999px;background:#f3f4f6;border:1px solid var(--l);font-size:12px;color:#4d4d52}.btn{font-size:13px;background:#fff;cursor:pointer}.btn.on{background:#1d1d1f;color:#fff;border-color:#1d1d1f}.ctrl{display:grid;gap:14px}.lab{font-size:12px;color:var(--m);margin-bottom:8px}.rail{display:flex;gap:8px;overflow:auto;scrollbar-width:none}.rail::-webkit-scrollbar{display:none}.focus{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}.f{padding:18px}.f b{display:block;color:var(--m);font-size:13px;margin-bottom:8px}.f p{margin:0;font-size:16px;line-height:1.65;font-weight:600}.head{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:14px}.time{font-size:12px;color:var(--m);margin-bottom:8px}h2{margin:0;font-size:28px;line-height:1.1;letter-spacing:-.02em}.stage{display:grid;grid-template-columns:1.25fr .9fr .9fr;gap:12px;margin-bottom:14px}.si{position:relative;min-height:260px;border-radius:24px;overflow:hidden;background:#eee;border:1px solid var(--l);cursor:pointer}.si.big{grid-row:span 2;min-height:420px}.si img,.card img,.mimg img{width:100%;height:100%;object-fit:cover;display:block}.ov{position:absolute;left:0;right:0;bottom:0;padding:15px;color:#fff;background:linear-gradient(180deg,transparent,rgba(0,0,0,.58))}.ov small{font-size:12px;opacity:.85}.ov b{display:block;margin-top:5px;font-size:17px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:#fbfbfd;border:1px solid var(--l);border-radius:24px;overflow:hidden}.card.hide{display:none}.card img{aspect-ratio:4/3;height:auto;cursor:pointer}.cb{padding:14px}.kind{font-size:12px;color:var(--a);font-weight:700;margin-bottom:8px}.card h3{margin:0 0 10px;font-size:19px}.line{margin:0 0 6px;color:var(--m);font-size:13px;line-height:1.75}.line b{color:var(--t)}.mini{margin-top:12px;padding:12px;border-radius:18px;background:#f3f4f7;border:1px solid var(--l);font-size:12px;line-height:1.7;color:#555}.case{margin-top:14px}.caseHead{display:flex;justify-content:space-between;gap:16px;align-items:end;margin-bottom:14px}.caseGrid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.caseArt{position:relative;height:520px;border-radius:24px;overflow:hidden;background:linear-gradient(90deg,#fafafa 0%,#eeeeec 45%,#dedbd6 100%);border:1px solid var(--l)}.wallShadow{position:absolute;inset:0;background:radial-gradient(circle at 65% 45%,rgba(0,0,0,.12),transparent 25%),radial-gradient(circle at 30% 35%,rgba(255,255,255,.75),transparent 30%)}.table{position:absolute;left:0;right:0;bottom:0;height:34%;background:linear-gradient(#d8bd98,#c9a77a)}.window{position:absolute;left:0;top:0;width:16%;height:72%;background:linear-gradient(90deg,#fff,#dfeff0);border-right:3px solid #ddd}.plant{position:absolute;left:3%;bottom:30%;width:70px;height:90px;border-radius:50%;background:radial-gradient(circle at 45% 20%,#89a96a 0 6px,transparent 7px),radial-gradient(circle at 60% 35%,#7da05e 0 7px,transparent 8px),radial-gradient(circle at 30% 45%,#94b979 0 6px,transparent 7px)}.machine{position:absolute;left:17%;bottom:25%;width:24%;height:auto;object-fit:contain;filter:drop-shadow(0 18px 20px rgba(0,0,0,.14));mix-blend-mode:multiply}.cup{position:absolute;left:45%;bottom:29%;width:48px;height:42px;background:#fff;border-radius:0 0 20px 20px;box-shadow:0 8px 18px rgba(0,0,0,.12)}.mag{position:absolute;right:13%;bottom:29%;width:150px;height:28px;background:#f7f7f7;border:1px solid #ddd;transform:skewX(-20deg);box-shadow:0 8px 18px rgba(0,0,0,.12)}.caseInfo{display:grid;gap:10px}.ibox{padding:14px;border:1px solid var(--l);border-radius:18px;background:#fafbfc}.ibox h4{margin:0 0 7px;font-size:14px}.ibox p{margin:0;color:var(--m);font-size:13px;line-height:1.8}.steps{margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.step{padding:13px;border:1px solid var(--l);border-radius:18px;background:#fafbfc}.step b{display:block;font-size:13px;margin-bottom:6px}.step p{margin:0;color:var(--m);font-size:12px;line-height:1.7}.method{margin-top:14px;display:grid;grid-template-columns:120px 1fr;gap:16px}.method b{color:var(--m);font-size:12px;letter-spacing:.1em}.method p{margin:0;color:#3a3a3f;font-size:15px;line-height:1.8}.modal{position:fixed;inset:0;background:rgba(13,13,16,.74);backdrop-filter:blur(10px);z-index:99;display:none;align-items:center;justify-content:center;padding:24px}.modal.show{display:flex}.mb{width:min(1280px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:28px;display:grid;grid-template-columns:1.1fr .9fr}.mimg{background:#eee;min-height:580px}.mi{padding:22px;display:grid;gap:13px}.mt{display:flex;justify-content:space-between}.mk{display:inline-block;padding:7px 10px;background:#eef5ff;color:#2563eb;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:10px}.mi h3{margin:0;font-size:28px}.close{border:1px solid var(--l);background:#f6f7f9;border-radius:999px;padding:8px 12px;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.trans{padding:15px;border-radius:18px;background:#111113;color:#fff}.trans p{color:rgba(255,255,255,.84)}@media(max-width:1080px){.top,.caseGrid{grid-template-columns:1fr}.focus,.steps{grid-template-columns:1fr}.stage{grid-template-columns:1fr 1fr}.si.big{grid-column:span 2;grid-row:auto}.cards{grid-template-columns:repeat(2,1fr)}.mb{grid-template-columns:1fr}}@media(max-width:720px){.w{padding:16px 12px}.hero h1{font-size:27px}.head,.caseHead{display:block}.stage,.cards{grid-template-columns:1fr}.si.big{grid-column:auto}.caseArt{height:380px}.machine{width:32%;left:18%}.method{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}</style></head><body><div class="w"><section class="top"><div class="box hero"><div class="k">PRIVATE VISUAL TRAINING DESK</div><h1>私人视觉训练台</h1><p>每天只训练一个判断：这张图为什么成立，我能怎么拍出来，怎么调色，怎么转译到 Dr.Coffee 的产品、展会、办公室和酒店场景里。</p><div class="keys" id="keys"></div></div><div class="box ctrl"><div><div class="lab">历史日期</div><div class="rail" id="dates"></div></div><div><div class="lab">时间段</div><div class="row"><button class="btn on" id="am">晨间</button><button class="btn" id="pm">晚间</button></div></div><div><div class="lab">内容筛选</div><div class="row" id="filters"><button class="btn on" data-f="全部">全部</button><button class="btn" data-f="摄影">摄影</button><button class="btn" data-f="镜头">镜头</button><button class="btn" data-f="穿搭">穿搭</button><button class="btn" data-f="Dr.Coffee">Dr.Coffee</button></div></div></div></section><section class="focus"><div class="box f"><b>今日只看</b><p id="focus"></p></div><div class="box f"><b>工作转译</b><p id="transfer"></p></div><div class="box f"><b>今天只记一个方法</b><p id="one"></p></div></section><section class="box main"><div class="head"><div><div class="time" id="time"></div><h2 id="theme"></h2><p class="desc" id="intro"></p></div><div class="pills"><span class="pill" id="datePill"></span><span class="pill">点击图片放大</span><span class="pill">含灯光 / 调色 / 模仿</span></div></div><div class="stage" id="stage"></div><div class="cards" id="cards"></div></section><section class="box case"><div class="caseHead"><div><div class="k">DR.COFFEE · 今日相关案例</div><h2 id="caseTitle"></h2><p class="desc" id="caseDesc"></p></div><div class="pills"><span class="pill">场景图</span><span class="pill">操作步骤</span><span class="pill">每日可见</span></div></div><div class="caseGrid"><div class="caseArt"><div class="wallShadow"></div><div class="window"></div><div class="table"></div><div class="plant"></div><img class="machine" id="caseImg"><div class="cup"></div><div class="mag"></div></div><div class="caseInfo"><div class="ibox"><h4>场景</h4><p id="caseScene"></p></div><div class="ibox"><h4>灯光</h4><p id="caseLight"></p></div><div class="ibox"><h4>构图 / 焦段</h4><p id="caseLens"></p></div><div class="ibox"><h4>调色</h4><p id="caseColor"></p></div></div></div><div class="steps" id="caseSteps"></div></section><section class="box method"><b>今日原则</b><p id="principle"></p></section></div><div class="modal" id="modal"><div class="mb"><div class="mimg"><img id="mimg"></div><div class="mi"><div class="mt"><div><div class="mk" id="mk"></div><h3 id="mtitle"></h3></div><button class="close" id="close">关闭</button></div><p class="desc" id="mdesc"></p><div class="grid"><div class="ibox"><h4>灯光角度</h4><p id="mlight"></p></div><div class="ibox"><h4>镜头 / 构图</h4><p id="mlens"></p></div><div class="ibox"><h4>调色倾向</h4><p id="mcolor"></p></div><div class="ibox"><h4>避免这样做</h4><p id="mavoid"></p></div></div><div class="trans"><h4>如何模仿 / 转译到 Dr.Coffee</h4><p id="mmimic"></p></div></div></div></div><script>const A='assets/products/';const R={window:'https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1600&q=82',chair:'https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=82',minimal:'https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1600&q=82',hotel:'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1600&q=82',knit:'https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=1600&q=82',jacket:'https://images.unsplash.com/photo-1516826957135-700dedea698c?auto=format&fit=crop&w=1600&q=82',f15:A+'f15-white-front.jpg',f15r:A+'f15-white-right.jpg',castle:A+'castle-300.jpg',castler:A+'castle-300-right.jpg',d30:A+'d30-plus-t-front.jpg'};const P={摄影:['主光从侧前方45°进入，优先窗光或大柔光；另一侧白板轻补。','24-50mm中景或中远景，让环境占60%左右。','低饱和，中性色温，高光-10~-25，阴影+5。','不要把白墙调黄，不要让木色过橙。','先选干净墙面或窗边空间；主体放1/3，右侧留给标题。'],镜头:['灯光服从场景逻辑，主光从真实窗口或侧后方来。','35mm/50mm固定机位最稳。先全景，再补1-2个细节。','整条片子保持同一色温，切镜之间亮度连续。','不要为炫技而运镜，不要把动作切碎。','一个镜头只讲一个动作：放杯、点屏、出液、取杯。'],穿搭:['侧前方柔光最适合看面料。','50-85mm更适合穿搭比例，看清肩线、衣长和裤型。','深灰、米白、浅棕、藏蓝适合低饱和体系。','不要堆Logo，不要同时出现太多设计点。','挺括外层+柔软内搭+直筒裤+低调鞋。'],'Dr.Coffee':['主光放在机器侧前或侧后45°，用柔光箱扩大高光面积。','35-70mm都可。Hero Shot用中焦，减少透视变形。','商务冷白或暖白都行，但必须统一；金属保持干净灰。','不要把机器拍成孤立物，不要背景杂乱，不要屏幕过曝。','把机器当成空间里的一件高级设备：先定场景，再定主光，最后保留杯子、桌面和留白。']};const DB={'2026-07-01':{morning:{label:'07:30 · 晨间',theme:'空气感',intro:'今天先别急着看主体。先看环境里的空气、光线和颜色是不是在同一个情绪里。',keys:['环境先行','重复变化','静态叙事','相同色温'],focus:'空气、光线、色温是否统一。',transfer:'用于办公室咖啡机、LinkedIn封面和产品氛围片。',one:'先找光，再放主体，最后才加道具。',principle:'先感受空气和光，再去看主体。',items:[['摄影',R.window,'先看空间空气','窗光、墙面、地面一起决定画面气质。','看光有没有在空间里流动。','先挑自然光好的时间拍。'],['镜头',R.chair,'静态镜头积累情绪','镜头停住，空气感才会出现。','看镜头为什么慢。','镜头停住，情绪才会出来。'],['Dr.Coffee',R.f15,'F15 办公室空气感','F15适合办公室茶水间和窗边咖啡角。','看白色机身和浅色空间的融合。','机器放左1/3，右侧留白。'],['穿搭',R.jacket,'挺括与柔软一起出现','外层有结构，内层稍柔软。','看外套和内搭的关系。','适合轻商务通勤。']],case:{title:'F15 白色版｜办公室空气感案例',desc:'根据白底产品图转译成一个建议拍摄场景：机器自然存在于办公室咖啡角里，安静、轻商务、有空气感。',img:R.f15,scene:'办公室茶水间 / 窗边咖啡角。浅灰墙面、木色台面、白杯、杂志、小植物。',light:'左后方45°柔光，正面白板轻补。不要把机器正面打平。',lens:'35mm或50mm，中景优先。机器放左1/3，右侧留白。',color:'低饱和，白墙不发黄，木色不过橙，机器白色保持干净。',steps:['先定场景','再找主光','放机器','加杯子与杂志']}}},'2026-07-02':{morning:{label:'07:30 · 晨间',theme:'商务厚重感',intro:'今天看深色空间里的稳定、材质和边缘光。',keys:['深木色','边缘光','稳重','商用感'],focus:'主体边缘是否被光托出来。',transfer:'用于酒店吧台、展厅、商务接待区。',one:'让机器先有体积，再加环境氛围。',principle:'厚重感来自材质和光，不是把画面压黑。',items:[['摄影',R.hotel,'深木色空间','材质比装饰重要。','看木色和暗部层次。','高光集中，不要全亮。'],['Dr.Coffee',R.castle,'Castle 300 酒店吧台','更适合酒店和高端商用空间。','看机器体量与环境厚度。','用深木色台面和侧后方高光。'],['Dr.Coffee',R.castler,'Castle 300 侧面体积','侧面适合表现设备厚度。','看屏幕、机身、侧面厚度。','低机位，中焦段，边缘光。']],case:{title:'Castle 300｜酒店商务感案例',desc:'把Castle 300从白底图转译成酒店吧台拍摄方案，强调稳重、厚度和商用价值。',img:R.castle,scene:'酒店吧台 / 商务接待区。深木色台面、暖灰墙、少量杯具。',light:'右后方或左后方45°暖白柔光，正面弱补，保留侧面暗部。',lens:'50mm中焦，略低机位，突出机器体量。',color:'暖灰+深木色，金属保持干净，不要发黄发脏。',steps:['搭深木色台面','放机器偏左','打侧后方柔光','只留杯子点缀']}}}};let date='2026-07-01',slot='morning',filter='全部';function item(a){let p=P[a[0]];return{type:a[0],img:a[1],title:a[2],desc:a[3],look:a[4],borrow:a[5],light:p[0],lens:p[1],color:p[2],avoid:p[3],mimic:p[4]}}function drawDates(){dates.innerHTML='';Object.keys(DB).sort().forEach(d=>{let b=document.createElement('button');b.className='btn'+(d===date?' on':'');b.textContent=d;b.onclick=()=>{date=d;render()};dates.appendChild(b)})}function render(){drawDates();let d=DB[date][slot]||DB[date].morning;time.textContent=d.label;theme.textContent=d.theme;intro.textContent=d.intro;datePill.textContent=date;focus.textContent=d.focus;transfer.textContent=d.transfer;one.textContent=d.one;principle.textContent=d.principle;keys.innerHTML=d.keys.map(k=>`<span class=tag>${k}</span>`).join('');let arr=d.items.map(item);stage.innerHTML='';arr.slice(0,4).forEach((it,i)=>{let e=document.createElement('div');e.className='si'+(i===0?' big':'');e.innerHTML=`<img src="${it.img}"><div class=ov><small>${it.type}</small><b>${it.title}</b></div>`;e.onclick=()=>openM(it);stage.appendChild(e)});cards.innerHTML='';arr.forEach(it=>{let h=!(filter==='全部'||it.type===filter);let c=document.createElement('article');c.className='card'+(h?' hide':'');c.innerHTML=`<img src="${it.img}"><div class=cb><div class=kind>${it.type}</div><h3>${it.title}</h3><p class=line><b>看：</b>${it.look}</p><p class=line><b>借：</b>${it.borrow}</p><div class=mini>${it.type==='Dr.Coffee'?'定场景、定主光、保留一处干净留白。':'先模仿光线和比例，不急着模仿道具。'}</div></div>`;c.querySelector('img').onclick=()=>openM(it);cards.appendChild(c)});let cs=d.case;caseTitle.textContent=cs.title;caseDesc.textContent=cs.desc;caseImg.src=cs.img;caseScene.textContent=cs.scene;caseLight.textContent=cs.light;caseLens.textContent=cs.lens;caseColor.textContent=cs.color;caseSteps.innerHTML=cs.steps.map((s,i)=>`<div class=step><b>STEP 0${i+1}</b><p>${s}</p></div>`).join('')}function openM(it){mimg.src=it.img;mk.textContent=it.type;mtitle.textContent=it.title;mdesc.textContent=it.desc;mlight.textContent=it.light;mlens.textContent=it.lens;mcolor.textContent=it.color;mavoid.textContent=it.avoid;mmimic.textContent=it.mimic;modal.classList.add('show');document.body.style.overflow='hidden'}function closeM(){modal.classList.remove('show');document.body.style.overflow=''}am.onclick=()=>{slot='morning';am.classList.add('on');pm.classList.remove('on');render()};pm.onclick=()=>{slot='evening';pm.classList.add('on');am.classList.remove('on');render()};document.querySelectorAll('#filters .btn').forEach(b=>b.onclick=()=>{filter=b.dataset.f;document.querySelectorAll('#filters .btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');render()});close.onclick=closeM;modal.onclick=e=>{if(e.target.id==='modal')closeM()};document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});render();</script></body></html>
