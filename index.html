let slot='morning';
const $=s=>document.querySelector(s);
const dates=Object.keys(DB).sort();
$('#dateSelect').innerHTML=dates.map(d=>`<option value="${d}">${d}</option>`).join('');
$('#dateSelect').value=dates[dates.length-1];
function render(){
  const date=$('#dateSelect').value;
  const d=DB[date][slot];
  $('#dateText').textContent=date;
  $('#summary').textContent=d.summary;
  $('#label').textContent=d.label;
  $('#theme').textContent=d.theme;
  $('#principle').textContent=d.principle;
  const labs=['主题主图','摄影延展','空间参考','穿搭层次','细节关系','情绪补充'];
  $('#gallery').innerHTML=d.gallery.map((x,i)=>`<div class="g"><img src="${x}" alt="${labs[i]}"><div class="cap">${labs[i]}</div></div>`).join('');
  $('#cards').innerHTML=d.cards.map(c=>`<article class="card"><img src="${c.img}" alt="${c.title}"><div class="body"><div class="group">${c.group}</div><h3>${c.title}</h3><p class="line"><b>看：</b>${c.watch}</p><p class="line"><b>借：</b>${c.apply}</p></div></article>`).join('');
}
$('#am').onclick=()=>{slot='morning';$('#am').classList.add('active');$('#pm').classList.remove('active');render()};
$('#pm').onclick=()=>{slot='evening';$('#pm').classList.add('active');$('#am').classList.remove('active');render()};
$('#dateSelect').onchange=render;
render();
</script>
