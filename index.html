(1360px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:28px;box-shadow:0 26px 90px rgba(0,0,0,.32);display:grid;grid-template-columns:1.12fr .88fr}.mimg{background:#eee;min-height:620px}.mi{padding:24px;display:grid;gap:14px;align-content:start}.mt{display:flex;justify-content:space-between;gap:16px}.mk{display:inline-block;padding:7px 10px;background:#eef5ff;color:#2563eb;border-radius:999px;font-size:12px;font-weight:650;margin-bottom:10px}.mi h3{margin:0;font-size:30px;line-height:1.08;letter-spacing:-.025em}.close{border:1px solid var(--l);background:#f6f7f9;border-radius:999px;padding:8px 12px;cursor:pointer}.md{color:var(--m);font-size:14px;line-height:1.85;margin:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.ib{background:#fafbfc;border:1px solid var(--l);border-radius:18px;padding:14px}.ib h4{margin:0 0 9px;font-size:14px}.ib p{margin:0;color:var(--m);font-size:13px;line-height:1.75}.trans{background:#111113;color:#fff;border-radius:20px;padding:16px}.trans h4{margin:0 0 10px;font-size:15px}.trans p{margin:0;color:rgba(255,255,255,.84);font-size:13px;line-height:1.85}@media(max-width:1080px){.hero{grid-template-columns:1fr}.focus{grid-template-columns:1fr}.stage{grid-template-columns:1fr 1fr}.si.big{grid-column:span 2;grid-row:auto;min-height:380px}.cards{grid-template-columns:repeat(2,1fr)}.mb{grid-template-columns:1fr}.mimg{min-height:380px}}@media(max-width:720px){.w{padding:16px 12px 34px}.intro h1{font-size:27px}.head{display:block}.pills{justify-content:flex-start;margin-top:12px}.stage{grid-template-columns:1fr}.si,.si.big{grid-column:auto;min-height:250px}.cards{grid-template-columns:1fr}.method{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.modal{padding:12px}.mi{padding:17px}.mi h3{font-size:24px}}</style></head><body><div class="w"><section class="hero"><div class="box intro"><div class="k">PRIVATE VISUAL TRAINING DESK</div><h1>私人视觉训练台</h1><p>每天只训练一个判断：这张图为什么成立，我能怎么拍出来，怎么调色，怎么转译到 Dr.Coffee 的产品、展会、办公室和酒店场景里。</p><div class="keys" id="keys"></div></div><div class="box ctl"><div><div class="lab">历史日期</div><div class="rail" id="dates"></div></div><div><div class="lab">时间段</div><div class="row"><button class="btn on" id="am">晨间</button><button class="btn" id="pm">晚间</button></div></div><div><div class="lab">内容筛选</div><div class="row" id="filters"><button class="btn on" data-f="全部">全部</button><button class="btn" data-f="摄影">摄影</button><button class="btn" data-f="镜头">镜头</button><button class="btn" data-f="穿搭">穿搭</button><button class="btn" data-f="Dr.Coffee">Dr.Coffee</button></div></div></div></section><section class="focus"><div class="box f"><b>今日只看</b><p id="focus"></p></div><div class="box f"><b>工作转译</b><p id="transfer"></p></div><div class="box f"><b>今天只记一个方法</b><p id="one"></p></div></section><section class="box main"><div class="head"><div><div class="time" id="time"></div><h2 id="theme"></h2><p class="desc" id="intro"></p></div><div class="pills"><span class="pill" id="datePill"></span><span class="pill">点击图片放大</span><span class="pill">含灯光 / 调色 / 模仿</span></div></div><div class="stage" id="stage"></div><div class="cards" id="cards"></div></section><section class="box method"><b>今日原则</b><p id="principle"></p></section><div class="foot">Daily Aesthetic · V3 · Dr.Coffee Product Library</div></div><div class="modal" id="modal"><div class="mb"><div class="mimg"><img id="mimg"></div><div class="mi"><div class="mt"><div><div class="mk" id="mk"></div><h3 id="mtitle"></h3></div><button class="close" id="close">关闭</button></div><p class="md" id="mdesc"></p><div class="grid"><div class="ib"><h4>灯光角度</h4><p id="mlight"></p></div><div class="ib"><h4>镜头 / 构图</h4><p id="mlens"></p></div><div class="ib"><h4>调色倾向</h4><p id="mcolor"></p></div><div class="ib"><h4>避免这样做</h4><p id="mavoid"></p></div></div><div class="trans"><h4>如何模仿 / 转译到 Dr.Coffee</h4><p id="mmimic"></p></div></div></div></div><script>const A='assets/products/';const IMG={window:'https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1600&q=82',coffee:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1600&q=82',chair:'https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=82',minimal:'https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1600&q=82',knit:'https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=1600&q=82',jacket:'https://images.unsplash.com/photo-1516826957135-700dedea698c?auto=format&fit=crop&w=1600&q=82',hotel:'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1600&q=82',corridor:'https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1600&q=82',arch:'https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1600&q=82',castle:A+'castle-300.jpg',castleR:A+'castle-300-right.jpg',castleB:A+'castle-300-rear.jpg',d30:A+'d30-plus-t-front.jpg',d30R:A+'d30-plus-t-right.jpg',d30L:A+'d30-plus-t-left.jpg',f15:A+'f15-white-front.jpg',f15R:A+'f15-white-right.jpg',f15L:A+'f15-white-left.jpg'};const P={摄影:['主光从侧前方45°进入，优先窗光或大柔光；另一侧白板轻补，保留暗部层次。','24-50mm中景或中远景，让环境占60%左右，主体做视觉落点。','低饱和、轻微暖白或中性色温。高光-10~-25，阴影+5，黑位轻微抬起。','不要把白墙调黄，不要让木色过橙，不要把暗部压成死黑。','先选一块干净墙面或窗边空间；主体放在画面1/3，右侧留给字幕或LinkedIn标题。'],镜头:['灯光服从场景逻辑，主光从真实窗口、顶灯或侧后方来。','35mm/50mm固定机位最稳。先全景建立空间，再补1-2个细节。','整条片子保持同一色温；对比不要太硬，切镜之间亮度连续。','不要为炫技而运镜，不要一条冷一条暖，不要把动作切碎。','一个镜头只讲一个动作：放杯、点屏、出液、取杯。动作结束后多留1秒。'],穿搭:['侧前方柔光最适合看面料，避免顶光太重压脸。','50-85mm更适合穿搭比例，留出脚下和头顶空间，看清肩线、衣长和裤型。','深灰、米白、浅棕、藏蓝、橄榄绿适合长期建立低饱和体系。','不要堆Logo，不要同时出现太多设计点，不要牺牲干净轮廓。','固定公式：挺括外层+柔软内搭+直筒裤+低调鞋。先轮廓稳定，再靠材质提升。'],'Dr.Coffee':['主光放在机器侧前或侧后45°，用柔光箱或大白布扩大高光面积；正面只轻补。','35-70mm都可。Hero Shot用中焦，减少透视变形；场景片先全景，再切屏幕、出液口、杯子。','商务冷白或暖白都行，但必须统一。高光压住，金属保持干净灰，不要脏黄。','不要把机器拍成孤立物，不要背景杂乱，不要屏幕过曝，不要让金属边缘没有高光。','把机器当成空间里的一件高级设备：先定酒店/办公室/展厅，再定主光方向，最后只保留杯子、桌面和一处留白。']};const DB={'2026-06-30':{morning:{label:'07:30 · 晨间',theme:'安藤忠雄式的光',intro:'今天不要急着找主体，先看光的形状。好的空间片，光本身就是主角。',keys:['混凝土','自然光','几何阴影','静止镜头'],focus:'光本身是不是已经完成构图。',transfer:'适合拍无影棚、展厅、咖啡机Hero Shot和建筑感产品片。',method:'拍之前先观察光落在哪里，再决定机器位置。',principle:'光本身就是构图，不只是照亮物体。',items:[['摄影',IMG.arch,'几何光影','先看光的边界，而不是先看主体。','看光斑和阴影怎样决定节奏。','拍之前先观察光怎么走。'],['镜头',IMG.corridor,'静止更能看空间','空间本身足够强时，镜头越稳越显高级。','看为什么镜头不需要乱动。','空间片可以更稳。'],['Dr.Coffee',IMG.castle,'Castle 300 Hero Shot','机器不需要太多道具，光线和结构先成立。','看主体边缘与背景的分离。','机器占画面1/3，墙面留白，灯从侧后方来。'],['Dr.Coffee',IMG.castleR,'Castle 300 右侧角度','侧面更适合表现机器厚度和操作区域。','看屏幕、出液区、机身侧面的关系。','侧前方45°柔光，正面白板轻补。'],['穿搭',IMG.jacket,'深浅比比花样重要','穿搭先看明度关系，再看设计。','看上浅下深或上深下浅。','先看明度关系。']]},evening:{label:'18:30 · 晚间',theme:'框中框',intro:'今天看边界。很多耐看的画面，不是拍得多满，而是通过框架把视线限定住。',keys:['门框','窗框','玻璃','边界构图'],focus:'画面边界有没有参与构图。',transfer:'适合拍办公室咖啡区、酒店走廊、展厅玻璃后的机器。',method:'站在门外或玻璃外拍，让边界先形成画框。',principle:'边界不是限制，而是构图工具。',items:[['摄影',IMG.window,'门框就是天然画框','门、窗、墙角能把主体收进画面里。','看前中后空间。','不要总站进空间中央。'],['镜头',IMG.corridor,'边界让镜头更稳','走廊、墙面、门框能自动整理画面。','看画面为什么更有秩序。','用门窗整理画面。'],['Dr.Coffee',IMG.f15,'F15 办公室咖啡区','F15体积小，适合放进办公室茶水间或小型吧台。','看白色机身和浅色空间的融合。','机器靠左，右侧留白做英文标题。'],['Dr.Coffee',IMG.f15R,'F15 右侧动线','右侧角度适合拍人物走近、点屏、拿杯。','看屏幕朝向和人手动作的关系。','固定机位，动作只讲一件事。'],['穿搭',IMG.knit,'低饱和穿搭','低饱和服装不抢机器和空间。','看灰、米白、浅棕是否统一。','减少生硬撞色。']]}},'2026-07-01':{morning:{label:'07:30 · 晨间',theme:'空气感',intro:'今天先别急着看主体。先看环境里的空气、光线和颜色是不是在同一个情绪里。',keys:['环境先行','重复变化','静态叙事','相同色温'],focus:'空气、光线、色温是否统一。',transfer:'用于办公室咖啡机、LinkedIn封面和产品氛围片。',method:'先找光，再放主体，最后才加道具。',principle:'先感受空气和光，再去看主体。',items:[['摄影',IMG.window,'先看空间空气','窗光、墙面、地面一起决定画面气质。','看光有没有在空间里流动。','先挑自然光好的时间拍。'],['镜头',IMG.chair,'静态镜头积累情绪','镜头停住，空气感才会出现。','看镜头为什么慢。','镜头停住，情绪才会出来。'],['Dr.Coffee',IMG.d30,'D30 Plus-T 正面案例','正面图适合做标准产品识别和参数型卡片。','看屏幕、出液口、机身正面是否干净。','白底产品图可做网页卡片，也可合成到办公场景。'],['Dr.Coffee',IMG.d30R,'D30 Plus-T 右侧案例','右侧图适合做半侧面Hero Shot。','看机身体积、屏幕方向和侧面厚度。','45°机位，背景用深灰或木色台面。'],['穿搭',IMG.jacket,'挺括与柔软一起出现','外层有结构，内层稍柔软。','看外套和内搭的关系。','适合你的轻商务通勤。']]},evening:{label:'18:30 · 晚间',theme:'柔和的边界',intro:'今晚的重点不是更强烈，而是更顺。看光、颜色、边界是不是都在做温和过渡。',keys:['柔光过渡','同一空气','统一色温','低饱和'],focus:'亮部、灰部、暗部是否过渡自然。',transfer:'适合拍酒店、办公室、机器金属和玻璃材质。',method:'让一种光源成为主导，其它光只做辅助。',principle:'好的画面依靠过渡，而不是刺激的对比。',items:[['摄影',IMG.hotel,'柔光让层次更完整','不是降低反差，而是保留亮、灰、暗的细节。','看亮部、灰部、暗部是否顺。','避免硬切的光比。'],['镜头',IMG.minimal,'过渡感比冲击感重要','镜头连接也要像光线一样柔和。','看镜头连接是不是平滑。','从构图到动作都别太跳。'],['Dr.Coffee',IMG.castleB,'Castle 300 背面维护角度','背面图适合做安装、维护、设备结构说明。','看机器背部空间和线材区域。','可用于售后教程，不建议做品牌主图。'],['Dr.Coffee',IMG.f15L,'F15 左侧空间摆放','左侧图适合判断机器靠墙、靠柜的摆放方式。','看机身侧面与空间边界。','适合做办公室小空间摆放案例。'],['Dr.Coffee',IMG.d30L,'D30 Plus-T 左侧空间摆放','左侧角度适合做场景动线和空间尺寸说明。','看机器和人行动线是否冲突。','适合酒店自助区或会议区。']]}}};let date='2026-07-01',slot='morning',filter='全部';function $(s){return document.querySelector(s)}function item(a){let p=P[a[0]];return{type:a[0],img:a[1],title:a[2],desc:a[3],look:a[4],borrow:a[5],light:p[0],lens:p[1],color:p[2],avoid:p[3],mimic:p[4]}}function renderDates(){document.getElementById('dates').innerHTML='';Object.keys(DB).sort().forEach(d=>{let b=document.createElement('button');b.className='btn'+(d===date?' on':'');b.textContent=d;b.onclick=()=>{date=d;render()};document.getElementById('dates').appendChild(b)})}function render(){renderDates();let d=DB[date][slot];time.textContent=d.label;theme.textContent=d.theme;intro.textContent=d.intro;datePill.textContent=date;focus.textContent=d.focus;transfer.textContent=d.transfer;one.textContent=d.method;principle.textContent=d.principle;keys.innerHTML=d.keys.map(k=>`<span class="key">${k}</span>`).join('');let arr=d.items.map(item);stage.innerHTML='';arr.slice(0,4).forEach((it,i)=>{let el=document.createElement('div');el.className='si'+(i===0?' big':'');el.innerHTML=`<img src="${it.img}" alt="${it.title}"><div class="ov"><small>${it.type}</small><b>${it.title}</b></div>`;el.onclick=()=>openM(it);stage.appendChild(el)});cards.innerHTML='';arr.forEach(it=>{let h=!(filter==='全部'||it.type===filter);let c=document.createElement('article');c.className='card'+(h?' hide':'');c.innerHTML=`<img src="${it.img}" alt="
