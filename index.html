<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>审美提示库</title><style>:root{--bg:#f5f5f7;--p:#fff;--t:#1d1d1f;--m:#6e6e73;--l:#e6e6eb;--a:#0071e3;--s:0 12px 32px rgba(0,0,0,.06)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.w{max-width:1320px;margin:auto;padding:24px 16px 48px}.box{background:var(--p);border:1px solid var(--l);border-radius:28px;box-shadow:var(--s)}.top{display:grid;grid-template-columns:1.18fr .82fr;gap:14px;margin-bottom:14px}.hero,.ctrl,.main,.case,.method{padding:22px}.k{font-size:12px;color:var(--m);letter-spacing:.08em;margin-bottom:10px}.hero h1{margin:0 0 10px;font-size:34px;line-height:1.08;letter-spacing:-.03em}.hero p,.desc{margin:0;color:var(--m);font-size:14px;line-height:1.85}.keys,.row,.pills{display:flex;gap:8px;flex-wrap:wrap}.keys{margin-top:14px}.tag,.pill,.btn{padding:8px 11px;border-radius:999px;background:#f3f4f6;border:1px solid var(--l);font-size:12px;color:#4d4d52}.btn{background:#fff;cursor:pointer;font-size:13px}.btn.on{background:#1d1d1f;color:#fff;border-color:#1d1d1f}.ctrl{display:grid;gap:14px}.lab{font-size:12px;color:var(--m);margin-bottom:8px}.rail{display:flex;gap:8px;overflow:auto;scrollbar-width:none}.rail::-webkit-scrollbar{display:none}.focus{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}.f{padding:18px}.f b{display:block;color:var(--m);font-size:13px;margin-bottom:8px}.f p{margin:0;font-size:16px;line-height:1.65;font-weight:600}.head,.caseHead{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:14px}.time{font-size:12px;color:var(--m);margin-bottom:8px}h2{margin:0;font-size:28px;line-height:1.1;letter-spacing:-.02em}.stage{display:grid;grid-template-columns:1.25fr .9fr .9fr;gap:12px;margin-bottom:14px}.si{position:relative;min-height:260px;border-radius:24px;overflow:hidden;background:#eee;border:1px solid var(--l);cursor:pointer}.si.big{grid-row:span 2;min-height:420px}.si img,.card img,.mimg img{width:100%;height:100%;object-fit:cover;display:block}.ov{position:absolute;left:0;right:0;bottom:0;padding:15px;color:#fff;background:linear-gradient(180deg,transparent,rgba(0,0,0,.58))}.ov small{font-size:12px;opacity:.85}.ov b{display:block;margin-top:5px;font-size:17px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:#fbfbfd;border:1px solid var(--l);border-radius:24px;overflow:hidden}.card img{aspect-ratio:4/3;height:auto;cursor:pointer}.cb{padding:14px}.kind{font-size:12px;color:var(--a);font-weight:700;margin-bottom:8px}.card h3{margin:0 0 10px;font-size:19px}.line{margin:0 0 6px;color:var(--m);font-size:13px;line-height:1.75}.line b{color:var(--t)}.mini{margin-top:12px;padding:12px;border-radius:18px;background:#f3f4f7;border:1px solid var(--l);font-size:12px;line-height:1.7;color:#555}.case{margin-top:14px}.caseGrid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.visual{position:relative;height:520px;border-radius:24px;overflow:hidden;background:#eee;border:1px solid var(--l)}.visual .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.72) contrast(.96) brightness(1.04)}.visual .wash{position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.18),rgba(255,255,255,.38))}.visual .machine{position:absolute;left:10%;bottom:13%;width:30%;max-height:65%;object-fit:contain;filter:drop-shadow(0 22px 26px rgba(0,0,0,.22))}.visual .title{position:absolute;right:6%;top:8%;max-width:42%;font-size:30px;font-weight:700;line-height:1.2;letter-spacing:-.02em}.visual .sub{position:absolute;right:6%;top:22%;max-width:42%;font-size:14px;color:#555;line-height:1.8}.caseInfo{display:grid;gap:10px}.ibox{padding:14px;border:1px solid var(--l);border-radius:18px;background:#fafbfc}.ibox h4{margin:0 0 7px;font-size:14px}.ibox p{margin:0;color:var(--m);font-size:13px;line-height:1.8}.steps{margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.step{padding:13px;border:1px solid var(--l);border-radius:18px;background:#fafbfc}.step b{display:block;font-size:13px;margin-bottom:6px}.step p{margin:0;color:var(--m);font-size:12px;line-height:1.7}.method{margin-top:14px;display:grid;grid-template-columns:120px 1fr;gap:16px}.method b{color:var(--m);font-size:12px;letter-spacing:.1em}.method p{margin:0;color:#3a3a3f;font-size:15px;line-height:1.8}.modal{position:fixed;inset:0;background:rgba(13,13,16,.74);backdrop-filter:blur(10px);z-index:99;display:none;align-items:center;justify-content:center;padding:24px}.modal.show{display:flex}.mb{width:min(1180px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:28px;display:grid;grid-template-columns:1.1fr .9fr}.mimg{background:#eee;min-height:520px}.mi{padding:22px;display:grid;gap:13px}.mt{display:flex;justify-content:space-between}.mk{display:inline-block;padding:7px 10px;background:#eef5ff;color:#2563eb;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:10px}.mi h3{margin:0;font-size:28px}.close{border:1px solid var(--l);background:#f6f7f9;border-radius:999px;padding:8px 12px;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.trans{padding:15px;border-radius:18px;background:#111113;color:#fff}.trans p{color:rgba(255,255,255,.84)}@media(max-width:1080px){.top,.caseGrid{grid-template-columns:1fr}.focus,.steps{grid-template-columns:1fr}.stage{grid-template-columns:1fr 1fr}.si.big{grid-column:span 2;grid-row:auto}.cards{grid-template-columns:repeat(2,1fr)}.mb{grid-template-columns:1fr}}@media(max-width:720px){.w{padding:16px 12px}.hero h1{font-size:27px}.head,.caseHead{display:block}.stage,.cards{grid-template-columns:1fr}.si.big{grid-column:auto}.visual{height:380px}.visual .machine{width:42%;left:6%}.visual .title{font-size:22px;right:5%;top:6%;max-width:50%}.visual .sub{display:none}.method{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}</style></head><body><div class="w"><section class="top"><div class="box hero"><div class="k">AESTHETIC CUE LIBRARY</div><h1>审美提示库</h1><p>上方只看审美输入：摄影、镜头、穿搭。下方固定给出 Dr.Coffee 今日相关案例，把当天主题转译成可拍摄的产品图方案。</p><div class="keys" id="keys"></div></div><div class="box ctrl"><div><div class="lab">历史日期</div><div class="rail" id="dates"></div></div><div><div class="lab">时间段</div><div class="row"><button class="btn on" id="am">晨间</button><button class="btn" id="pm">晚间</button></div></div><div class="desc">每天早晚内容会写入这个网页；旧日期保留，新内容继续累加。</div></div></section><section class="focus"><div class="box f"><b>今日只看</b><p id="focus"></p></div><div class="box f"><b>工作转译</b><p id="transfer"></p></div><div class="box f"><b>今天只记一个方法</b><p id="one"></p></div></section><section class="box main"><div class="head"><div><div class="time" id="time"></div><h2 id="theme"></h2><p class="desc" id="intro"></p></div><div class="pills"><span class="pill" id="datePill"></span><span class="pill">摄影 / 镜头 / 穿搭</span><span class="pill">点击图片放大</span></div></div><div class="stage" id="stage"></div><div class="cards" id="cards"></div></section><section class="box case"><div class="caseHead"><div><div class="k">DR.COFFEE · 今日相关案例</div><h2 id="caseTitle"></h2><p class="desc" id="caseDesc"></p></div><div class="pills"><span class="pill">案例画面</span><span class="pill">操作步骤</span><span class="pill">每日固定展示</span></div></div><div class="caseGrid"><div class="visual"><img class="bg" id="caseBg"><div class="wash"></div><img class="machine" id="caseMachine"><div class="title" id="caseVisualTitle"></div><div class="sub" id="caseVisualSub"></div></div><div class="caseInfo"><div class="ibox"><h4>场景</h4><p id="caseScene"></p></div><div class="ibox"><h4>灯光</h4><p id="caseLight"></p></div><div class="ibox"><h4>构图 / 焦段</h4><p id="caseLens"></p></div><div class="ibox"><h4>调色</h4><p id="caseColor"></p></div></div></div><div class="steps" id="caseSteps"></div></section><section class="box method"><b>今日原则</b><p id="principle"></p></section></div><div class="modal" id="modal"><div class="mb"><div class="mimg"><img id="mimg"></div><div class="mi"><div class="mt"><div><div class="mk" id="mk"></div><h3 id="mtitle"></h3></div><button class="close" id="close">关闭</button></div><p class="desc" id="mdesc"></p><div class="grid"><div class="ibox"><h4>灯光角度</h4><p id="mlight"></p></div><div class="ibox"><h4>镜头 / 构图</h4><p id="mlens"></p></div><div class="ibox"><h4>调色倾向</h4><p id="mcolor"></p></div><div class="ibox"><h4>避免这样做</h4><p id="mavoid"></p></div></div><div class="trans"><h4>如何模仿</h4><p id="mmimic"></p></div></div></div></div><script>const U='https://images.unsplash.com/';const A='assets/products/';const IMG={office:U+'photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=78',hotel:U+'photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1600&q=78',minimal:U+'photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1600&q=78',window:U+'photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1600&q=78',arch:U+'photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1600&q=78',wear:U+'photo-1516826957135-700dedea698c?auto=format&fit=crop&w=1600&q=78',knit:U+'photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=1600&q=78',f15:A+'f15-white-front.jpg',castle:A+'castle-300.jpg',d30:A+'d30-plus-t-front.jpg'};const THEMES={warm:['克制的暖灰氛围','留白、暖灰、人物与空间是否统一。','让环境先说话，主体后出现。'],industrial:['静谧的工业美学','金属、混凝土、玻璃是否被柔光统一。','材质优先，装饰靠后。'],brand:['冷静的品牌表达','阴影、重复、环境是否形成品牌秩序。','品牌感来自秩序和留白。'],space:['留白与呼吸感','负空间、桌面边界、自然动作是否干净。','画面不是越满越高级。'],edge:['边缘光','轮廓光、金属高光、玻璃反射是否清楚。','高光不只是照明，也负责塑造形体。'],light:['安藤忠雄式的光','光的形状是否已经完成构图。','光本身就是构图。'],air:['空气感','空气、光线、色温是否统一。','先感受空气和光，再去看主体。']};function day(themeKey,caseObj){let t=THEMES[themeKey];return{morning:{label:'07:30 · 晨间',theme:t[0],intro:t[1],keys:[t[0],'低饱和','留白','可执行'],focus:t[1],transfer:caseObj.transfer,one:caseObj.one,principle:t[2],items:[{type:'摄影',img:IMG.window,title:'先看空间空气',look:'看光有没有在空间里流动。',borrow:'先挑自然光好的时间拍。'},{type:'镜头',img:IMG.minimal,title:'稳定镜头建立秩序',look:'看机位为什么不乱动。',borrow:'一个镜头只讲一件事。'},{type:'穿搭',img:IMG.wear,title:'轮廓比装饰重要',look:'看肩线、衣长和裤型。',borrow:'低饱和、少设计点。'}],case:caseObj},evening:{label:'18:30 · 晚间',theme:t[0],intro:t[1],keys:[t[0],'低饱和','留白','复盘'],focus:t[1],transfer:caseObj.transfer,one:caseObj.one,principle:t[2],items:[{type:'摄影',img:IMG.hotel,title:'材质和光线先成立',look:'看墙面、木色、金属的关系。',borrow:'不要把空间照平。'},{type:'镜头',img:IMG.arch,title:'边界整理画面',look:'看门框、窗框、墙面如何组织视线。',borrow:'用空间做天然构图。'},{type:'穿搭',img:IMG.knit,title:'材质做层次',look:'看哑光、棉、羊毛的差异。',borrow:'同色系靠材质变化。'}],case:caseObj}}}const C={f15:{title:'F15 白色版｜办公室空气感案例',desc:'把F15放进办公室茶水间或窗边咖啡角，目标是安静、轻商务、有空气感。',machine:IMG.f15,bg:IMG.office,scene:'办公室茶水间 / 窗边咖啡角。浅灰墙面、木色台面、白杯、杂志、小植物。',light:'左后方45°柔光，正面白板轻补。不要把机器正面打平。',lens:'35mm或50mm，中景优先。机器放左1/3，右侧留白。',color:'低饱和，白墙不发黄，木色不过橙，机器白色保持干净。',steps:['先定场景','再找主光','放机器','微调构图'],transfer:'用于办公室咖啡机、LinkedIn封面和产品氛围片。',one:'先找光，再放主体，最后才加道具。'},castle:{title:'Castle 300｜酒店商务感案例',desc:'把Castle 300转译成酒店吧台拍摄方案，强调稳重、厚度和商用价值。',machine:IMG.castle,bg:IMG.hotel,scene:'酒店吧台 / 商务接待区。深木色台面、暖灰墙、少量杯具。',light:'右后方或左后方45°暖白柔光，正面弱补，保留侧面暗部。',lens:'50mm中焦，略低机位，突出机器体量。',color:'暖灰+深木色，金属保持干净，不要发黄发脏。',steps:['搭深木色台面','放机器偏左','打侧后方柔光','只留杯子点缀'],transfer:'适合酒店吧台、展厅、商务接待区。',one:'让机器先有体积，再加环境氛围。'},d30:{title:'D30 Plus-T｜展厅标准氛围案例',desc:'用理性空间表现产品识别和商用专业感。',machine:IMG.d30,bg:IMG.arch,scene:'展厅 / 产品体验区。灰白背景、干净台面、少量信息牌。',light:'侧后方45°柔光，正面白板轻补，屏幕不过曝。',lens:'35mm或50mm，中景优先，保留产品完整正面。',color:'冷白偏中性，金属干净，屏幕色彩不过饱和。',steps:['清空背景','放正产品','调屏幕亮度','补拍细节'],transfer:'适合展厅、官网参数图和销售资料。',one:'先保证产品识别，再做氛围。'}};const DB={'2026-06-25':day('warm',C.f15),'2026-06-26':day('industrial',C.d30),'2026-06-27':day('brand',C.f15),'2026-06-28':day('space',C.castle),'2026-06-29':day('edge',C.d30),'2026-06-30':day('light',C.castle),'2026-07-01':day('air',C.f15)};let date='2026-07-01',slot='morning';const P={摄影:['主光从侧前方45°进入，保留暗部层次。','24-50mm中景或中远景，让环境占60%左右。','低饱和，中性色温，高光压住，阴影微提。','不要把白墙调黄，不要把暗部压死。','先模仿光线和比例，不急着模仿道具。'],镜头:['灯光服从场景逻辑，主光从真实窗口或侧后方来。','35mm/50mm固定机位最稳。先全景，再补1-2个细节。','整条片子保持同一色温。','不要为炫技而运镜，不要把动作切碎。','一个镜头只讲一个动作，结束后多停1秒。'],穿搭:['侧前方柔光最适合看面料。','50-85mm更适合穿搭比例。','深灰、米白、浅棕、藏蓝适合低饱和体系。','不要堆Logo，不要同时出现太多设计点。','挺括外层+柔软内搭+直筒裤。']};function $(s){return document.querySelector(s)}function renderDates(){dates.innerHTML='';Object.keys(DB).sort().forEach(d=>{let b=document.createElement('button');b.className='btn'+(d===date?' on':'');b.textContent=d;b.onclick=()=>{date=d;render()};dates.appendChild(b)})}function render(){renderDates();let d=DB[date][slot];time.textContent=d.label;theme.textContent=d.theme;intro.textContent=d.intro;datePill.textContent=date;focus.textContent=d.focus;transfer.textContent=d.transfer;one.textContent=d.one;principle.textContent=d.principle;keys.innerHTML=d.keys.map(k=>`<span class=tag>${k}</span>`).join('');stage.innerHTML='';cards.innerHTML='';d.items.forEach((it,i)=>{let e=document.createElement('div');e.className='si'+(i===0?' big':'');e.innerHTML=`<img src="${it.img}"><div class=ov><small>${it.type}</small><b>${it.title}</b></div>`;e.onclick=()=>openM(it);stage.appendChild(e);let c=document.createElement('article');c.className='card';c.innerHTML=`<img src="${it.img}"><div class=cb><div class=kind>${it.type}</div><h3>${it.title}</h3><p class=line><b>看：</b>${it.look}</p><p class=line><b>借：</b>${it.borrow}</p><div class=mini>${P[it.type][4]}</div></div>`;c.querySelector('img').onclick=()=>openM(it);cards.appendChild(c)});let cs=d.case;caseTitle.textContent=cs.title;caseDesc.textContent=cs.desc;caseBg.src=cs.bg;caseMachine.src=cs.machine;caseVisualTitle.textContent=cs.title.replace('｜','\n');caseVisualSub.textContent=cs.desc;caseScene.textContent=cs.scene;caseLight.textContent=cs.light;caseLens.textContent=cs.lens;caseColor.textContent=cs.color;caseSteps.innerHTML=cs.steps.map((s,i)=>`<div class=step><b>STEP 0${i+1}</b><p>${s}</p></div>`).join('')}function openM(it){let p=P[it.type];mimg.src=it.img;mk.textContent=it.type;mtitle.textContent=it.title;mdesc.textContent=it.look;mlight.textContent=p[0];mlens.textContent=p[1];mcolor.textContent=p[2];mavoid.textContent=p[3];mmimic.textContent=p[4];modal.classList.add('show');document.body.style.overflow='hidden'}function closeM(){modal.classList.remove('show');document.body.style.overflow=''}am.onclick=()=>{slot='morning';am.classList.add('on');pm.classList.remove('on');render()};pm.onclick=()=>{slot='evening';pm.classList.add('on');am.classList.remove('on');render()};close.onclick=closeM;modal.onclick=e=>{if(e.target.id==='modal')closeM()};document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});render();</script></body></html>
